[workspace]
authors = ["NicoStellwag <nico.stellwag@gmail.com>"]
channels = ["conda-forge", "pytorch", "nvidia"]
name = "surgery-scene-graphs"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
# LIBRARY_PATH needed for Triton to find libcuda.so at compile time
LIBRARY_PATH = "$PIXI_PROJECT_ROOT/.pixi/envs/default/lib/stubs:$PIXI_PROJECT_ROOT/.pixi/envs/default/lib:$LIBRARY_PATH"
# C_INCLUDE_PATH/CPATH needed for Triton JIT to find crypt.h and other headers
C_INCLUDE_PATH = "$PIXI_PROJECT_ROOT/.pixi/envs/default/include:$C_INCLUDE_PATH"
CPATH = "$PIXI_PROJECT_ROOT/.pixi/envs/default/include:$CPATH"
TOKENIZERS_PARALLELISM = "false"
PYTHONNOUSERSITE = "1"

[dependencies]
python = "==3.10"
cuda-toolkit = "12.8.*"
cuda-version = "==12.8"
cuda-driver-dev = "12.8.*"
libxcrypt = "*"
uv = ">=0.1.0"
libjpeg-turbo = ">=3.1.2,<4"

[tasks]
# Initialize git submodules
init-submodules = "git submodule update --init --recursive"

# PyTorch installation for CUDA 12.8
install-pytorch = "uv pip install torch==2.9.0 torchvision torchaudio --index-url https://download.pytorch.org/whl/cu128"

# vLLM installation from official PyPI
install-vllm-deps = "uv pip install six==1.17.0 && uv pip install 'setuptools==79.0.1'"

install-vllm = "uv pip install vllm==0.15.1"

# Install CoTracker from git (fixed commit)
install-cotracker = "uv pip install git+https://github.com/facebookresearch/co-tracker.git@82e02e8029753ad4ef13cf06be7f4fc5facdda4d"

# Install Depth Anything V3 from submodule
install-depth-anything-3 = "cd submodules/depth-anything-3 && uv pip install -e . && cd ../.."

download-cotracker-checkpoint = """
mkdir -p checkpoints && \
wget -O checkpoints/cotracker3_scaled_offline.pth https://huggingface.co/facebook/cotracker3/resolve/main/scaled_offline.pth || \
curl -L -o checkpoints/cotracker3_scaled_offline.pth https://huggingface.co/facebook/cotracker3/resolve/main/scaled_offline.pth
"""

install-sam2 = """
cd submodules/SASVi/src/sam2 && uv pip install -e . && cd ../../../..
"""

download-sam2-checkpoint = """
mkdir -p submodules/SASVi/src/sam2/checkpoints && \
cd submodules/SASVi/src/sam2/checkpoints && \
wget -O sam2.1_hiera_large.pt https://dl.fbaipublicfiles.com/segment_anything_2/092824/sam2.1_hiera_large.pt || \
curl -L -o sam2.1_hiera_large.pt https://dl.fbaipublicfiles.com/segment_anything_2/092824/sam2.1_hiera_large.pt && \
cd ../../../../..
"""

download-cholecseg8k = """
mkdir -p data/cholecseg8k && \
wget -O data/cholecseg8k/cholecseg8k.zip https://www.kaggle.com/api/v1/datasets/download/newslab/cholecseg8k || \
curl -L -o data/cholecseg8k/cholecseg8k.zip https://www.kaggle.com/api/v1/datasets/download/newslab/cholecseg8k && \
unzip -o data/cholecseg8k/cholecseg8k.zip -d data/cholecseg8k
"""

download-benchmark-annotations = """
mkdir -p data/annotations data/.tmp && \
wget -O data/surg4d-benchmark-main.zip https://codeload.github.com/NicoStellwag/surg4d-benchmark/zip/refs/heads/main || \
curl -L -o data/surg4d-benchmark-main.zip https://codeload.github.com/NicoStellwag/surg4d-benchmark/zip/refs/heads/main && \
unzip -o data/surg4d-benchmark-main.zip 'surg4d-benchmark-main/annotations/*' -d data/.tmp && \
cp -Rf data/.tmp/surg4d-benchmark-main/annotations/. data/annotations/ && \
rm -rf data/.tmp
"""

install-sds-playground = """
cd submodules/SDS_Playground && uv pip install -e . && cd ../..
"""

install-python-deps = """
uv pip install \
  hydra-core==1.3.2 \
  qwen-vl-utils==0.0.14 \
  rerun-sdk==0.23.1 \
  accelerate==1.12.0 \
  transformers==4.57.1 \
  notebook==7.5.3 \
  albumentations==1.3.1 \
  jpeg4py==0.1.4
"""


# Full setup - follows dependency order
setup = { depends-on = ["init-submodules", "install-pytorch", "install-vllm-deps", "install-vllm", "install-cotracker", "install-depth-anything-3", "download-cotracker-checkpoint", "install-sam2", "download-sam2-checkpoint", "install-sds-playground", "install-python-deps"] }

# Test installation
test-install = """
python -c "import torch; print(f'PyTorch {torch.__version__} (CUDA: {torch.cuda.is_available()})')" && \
python -c "import vllm; print(f'vLLM {vllm.__version__} imported successfully')" && \
python -c "from depth_anything_3.api import DepthAnything3; print('Depth Anything V3 imported successfully')" && \
python -c "import cotracker; print('CoTracker imported successfully')"
"""

# Dependency check
check-deps = "uv pip list && python -m pip check"

# Clean build artifacts
clean = """
find . -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true && \
find . -type d -name '*.egg-info' -exec rm -rf {} + 2>/dev/null || true && \
find . -type d -name 'build' -exec rm -rf {} + 2>/dev/null || true && \
find . -type d -name 'dist' -exec rm -rf {} + 2>/dev/null || true
"""

# Reset submodules to clean state
reset-submodules = """
git submodule foreach --recursive git clean -fdx && \
git submodule foreach --recursive git reset --hard && \
git submodule update --init --recursive
"""
