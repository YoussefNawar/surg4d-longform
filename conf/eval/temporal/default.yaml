# ============================================================================
# TEMPORAL BENCHMARK CONFIGURATION
# ============================================================================
# This config defines settings for temporal action localization evaluation
# Query-specific questions and ground truth are in JSON annotation files

# Methods to run (similar to spatial evaluation)
methods: ["multiframe", "graph_agent"]
# Ground-truth temporal labels location (no preprocessing required)
labels_root: data/temporal_labels
labels_filename_template: "{clip_name}_temporal.json"

# Where to dump per-clip prediction files during eval
output_dir: ${eval.output_dir}/temporal

# Tool visualization (null to disable, directory path to enable)
tool_viz_dir: ${eval.output_dir}/tool_viz/temporal

# ============================================================================
# MULTIFRAME (video-only baseline)
# ============================================================================
multiframe_action_onset_system_prompt: |
  # Task
  You are an expert visceral surgeon analyzing a cholecystectomy video sequence for temporal reasoning.
  You have access to a video of the scene.

  # Answer format
  Your final answer should always contain exactly one point in time as a JSON object. Never refuse!
  Report the point in time in seconds.

multiframe_action_onset_prompt_template: |
  Identify the point in time when '{question}' first starts.

  Example output (format only): ... {{"second": 1.68}} ...

multiframe_action_duration_system_prompt: |
  # Task
  You are an expert visceral surgeon analyzing a cholecystectomy video sequence for temporal reasoning.
  You have access to a video of the scene.

  # Answer format
  Your final answer should always contain a list of time ranges as a JSON object. Never refuse!
  Report the time ranges in seconds.

multiframe_action_duration_prompt_template: |
  Identify the time range(s) during which '{question}' occurs.

  Example output (format only): ... {{"second_ranges": [[0.68, 1.36], [1.80, 2.32]]}} ...


# ============================================================================
# GRAPH_AGENT (agentic exploration with tools)
# ============================================================================
graph_agent_autoencoder_checkpoint_subdir: ${autoencoder.checkpoint_subdir}
graph_agent_autoencoder_full_dim: ${autoencoder.full_dim}
graph_agent_autoencoder_latent_dim: ${autoencoder.latent_dim}
graph_agent_use_global_autoencoder: ${autoencoder.global_mode}
graph_agent_global_autoencoder_checkpoint_dir: ${autoencoder.global_checkpoint_dir}
graph_agent_max_iterations: 30
graph_agent_tools:
  - name: node_distances_through_time
    max_calls: null  # unlimited
  - name: node_overlap_scores_through_time
    max_calls: null  # unlimited
  - name: inspect_node_through_time
    max_calls: 5
  - name: inspect_scene_at_time
    max_calls: 3
  - name: inspect_highres_node_at_time
    max_calls: 5
  - name: voxelize_scene
    max_calls: 5

graph_agent_action_onset_system_prompt: |
  # Task
  You are an expert visceral surgeon analyzing a cholecystectomy scene for temporal reasoning.
  You have access to tools that represent the scene as a 3D scene graph or voxelized.
  Your initial scene representation is a set of graph nodes at timestep 0.

  # Scene representation
  - Coordinate system:
      - increase in x means movement to the right
      - increase in y means movement to the bottom
      - increase in z means movement away from the camera

  # Rules
  - Strictly respect tool call limits. (Initially given by user prompt, updated by tool responses.)

  # Answer format
  Your final answer should always contain exactly one point in time as a JSON object. Never refuse!
  Report the point in time as a timestep (integer).
graph_agent_action_onset_prompt_template: |
  Identify the point in time when '{question}' occurs.

  The graph has {num_frames} timesteps (t=0 to t={last_frame}).

  Example output (format only): ... {{"timestep": T}} ...

graph_agent_action_duration_system_prompt: |
  # Task
  You are an expert visceral surgeon analyzing a cholecystectomy scene for temporal reasoning.
  You have access to tools that represent the scene as a 3D scene graph or voxelized.
  Your initial scene representation is a set of graph nodes at timestep 0.

  # Scene representation
  - Coordinate system:
      - increase in x means movement to the right
      - increase in y means movement to the bottom
      - increase in z means movement away from the camera

  # Rules
  - Strictly respect tool call limits. (Initially given by user prompt, updated by tool responses.)

  # Answer format
  Your final answer should always contain a list of time ranges as a JSON object. Never refuse!
  Report time ranges as timestep pairs (integers, start and end inclusive).
graph_agent_action_duration_prompt_template: |
  Identify the time range(s) during which '{question}' occurs.

  The graph has {num_frames} timesteps (t=0 to t={last_frame}).

  Example output (format only): ... {{"ranges": [[S_1, E_1], [S_2, E_2]]}} ...
