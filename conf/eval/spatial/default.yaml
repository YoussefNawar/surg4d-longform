colormap: "jet"
use_bnb_4bit: false
use_bnb_8bit: false
gt_filename: ${preprocessing.spatial_labels_output_filename}
output_dir: ${eval.output_dir}/spatial
dump_visualizations: true
visualizations_dir: ${eval.output_dir}/spatial_viz

layers: [14, 16, 18, 20, 22]
top_k_scores: 10 # for attn based methods wo/ refinement

# splat: attention scores over all gaussians
# splat_system_prompt: |
#   You are an expert surgical assistant. The visual evidence is provided as an unordered set of
#   patch-level descriptors without any spatial or grid layout. Treat these descriptors as an
#   unordered collection; do not rely on pixel positions, patch adjacency, or image structure.
#   Focus only on semantic similarity between the query and the descriptors. No explanations are needed.
splat_system_prompt: |
  You are an expert surgical assistant. Focus attention on the most relevant visual elements
  in the image that correspond to the user's query. No explanations are needed.
splat_prompt_template: "Locate {substring} using the unordered patch descriptors. Ignore spatial order and grid structure; match semantics only."

# static graph: just ask the static graph
static_graph_system_prompt: |
  You are an expert visceral surgeon analyzing a cholecystectomy scene using an approximate scene graph.
  - The scene graph is a general description; it may not name every tool or action explicitly.
  - Always infer a best-guess 3D location for the queried concept using surgical knowledge,
    synonyms, and spatial understanding of the provided objects, relationships, and extents.
  - Never refuse. Never say the concept is missing. Never return an empty object.
  - You may briefly reason first. Then, on a new line at the end, output ONLY a final JSON object with numeric fields: x, y, z.
  - The coordinates must be in the same 3D coordinate system as the scene graph.
static_graph_prompt_template: |
  Query: '{substring}'

  Task: Infer the most plausible 3D location of the queried concept within the scene described
  by the provided scene graph. Even if the exact term is not present as a node or edge label,
  use synonyms, typical surgical context, object geometry (centroids/extents), and spatial
  relations to pick a best-guess location.

  Output format: respond ONLY with a valid JSON object having numeric fields x, y, z.
  Example (format only): {"x": 0.12, "y": -0.08, "z": 0.95}

# frame_attn: attention scores over frame patches
frame_attn_system_prompt: |
  You are an expert surgical assistant. Focus attention on the most relevant visual elements
  in the image that correspond to the user's query. No explanations are needed.
frame_attn_prompt_template: "Locate {substring} in the scene."

# frame attn refine: 2d attention score proposal, final pixel guess by qwen
frame_attn_refine_attn_layer: 16
frame_attn_refine_include_scores_in_context: false
frame_attn_refine_max_proposals: 10
frame_attn_refine_system_prompt: |
  You are an expert surgical assistant. First, consider the scene content and the candidate pixel proposals.
  - Use typical surgical context and the visible objects/regions to reason where the queried concept is likely located.
  - Then, select a single most plausible exact pixel location by choosing one of the provided candidate proposals.
  - You may briefly reason first. Then, on a new line at the end, output ONLY a final JSON object with numeric fields: x, y.
frame_attn_refine_prompt_template: |
  Query: '{substring}'

  Task:
  1) Infer a plausible image region for the queried concept using the visual scene.
  2) From the candidate pixel proposals listed below, choose the single best pixel (x, y) that fits this region.

# Attention layer for 2D proposal extraction

